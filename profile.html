<!DOCTYPE html>
<html>
<head>
<title>User Profile</title>

<style>

body{
font-family: Arial;
padding:40px;
}

.profile-card{
width:350px;
padding:20px;
border:1px solid #ccc;
border-radius:10px;
}

img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
}

input{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px;
margin-right:10px;
}

</style>

</head>

<body>

<h2>User Profile Management</h2>

<div class="profile-card">

<img id="avatarPreview" src="default-avatar.png">

<br><br>

<label>Upload Profile Picture</label>
<input type="file" onchange="uploadAvatar(event)">

<label>Display Name</label>
<input type="text" id="displayName">

<label>Email</label>
<input type="email" id="email">

<button onclick="saveProfile()">Save Profile</button>
<button onclick="resetProfile()">Reset</button>

</div>

<script src="profile.js"></script>

</body>
</html>
